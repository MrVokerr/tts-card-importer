# Daily token metadata sync (runs on GitHub-hosted runners — not your PC).
name: R2 token sync

on:
  schedule:
    # Daily 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild even if Scryfall bulk updatedAt unchanged'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  sync-tokens:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: R2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: R2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync token metadata to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            EXTRA="--force"
          fi
          node scripts/sync-tokens.js $EXTRA

      - name: Verify public CDN
        if: success()
        env:
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          BASE="${R2_PUBLIC_BASE_URL:-https://pub-6c935b50ab2c43f291df08b7f566585b.r2.dev}"
          npm run verify -- --base-url="$BASE"
